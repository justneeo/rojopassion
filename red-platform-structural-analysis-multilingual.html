<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RED Platform — Structural Overview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff7fb;
      --bg-soft: #fff1f7;
      --panel: rgba(255,255,255,0.78);
      --panel-strong: rgba(255,255,255,0.92);
      --line: rgba(205, 112, 155, 0.18);
      --line-strong: rgba(205, 112, 155, 0.32);
      --text: #341b2b;
      --muted: #7f6073;
      --accent: #e7a4c3;
      --accent-strong: #cf739f;
      --accent-soft: #f8d7e7;
      --ok: #4c9b7e;
      --warn: #c5942f;
      --danger: #c85873;
      --blue: #6f88d9;
      --shadow: 0 20px 60px rgba(191, 113, 147, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 214, 232, 0.85), transparent 32%),
        radial-gradient(circle at top right, rgba(255, 234, 242, 0.8), transparent 26%),
        linear-gradient(180deg, #fff9fc 0%, #fff5fa 100%);
      min-height: 100vh;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.35), transparent 80%);
      opacity: 0.35;
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 20px 72px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .pill, .lang-btn, .tab-btn, .mini-pill {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: var(--muted);
    }

    .pill {
      border-radius: 999px;
      padding: 10px 14px;
      font: 600 12px/1 JetBrains Mono, monospace;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent-strong);
      box-shadow: var(--shadow);
    }

    .lang-switcher {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.62);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .lang-btn {
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font: 700 12px/1 Inter, sans-serif;
      transition: .22s ease;
    }
    .lang-btn.active {
      background: linear-gradient(180deg, #f8c9de, #efb0cc);
      color: #5a2141;
      border-color: rgba(207, 115, 159, 0.45);
      box-shadow: 0 10px 24px rgba(207, 115, 159, 0.22);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.4fr .95fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .hero-main {
      padding: 34px;
      position: relative;
      overflow: hidden;
    }

    .hero-main::before {
      content: "";
      position: absolute;
      width: 380px;
      height: 380px;
      right: -110px;
      top: -150px;
      background: radial-gradient(circle, rgba(231, 164, 195, 0.42), transparent 70%);
      pointer-events: none;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(44px, 8vw, 86px);
      line-height: .92;
      letter-spacing: -0.06em;
    }

    .gradient-text {
      background: linear-gradient(135deg, #4b2137 0%, #bb6d95 58%, #f0abc8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 18px;
      color: var(--muted);
      max-width: 700px;
      line-height: 1.6;
      margin: 0 0 24px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 24px;
    }

    .stat {
      padding: 18px;
      border-radius: 20px;
      background: var(--panel-strong);
      border: 1px solid rgba(207, 115, 159, 0.14);
    }

    .stat-value {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .stat-label {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .hero-side {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      justify-content: space-between;
    }

    .side-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent-strong);
      margin-bottom: 6px;
    }

    .health-item {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(205, 112, 155, 0.12);
      font-size: 14px;
    }
    .health-item:last-child { border-bottom: 0; }

    .badge-status {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .ok { color: var(--ok); background: rgba(76,155,126,0.12); }
    .warn { color: var(--warn); background: rgba(197,148,47,0.14); }
    .danger { color: var(--danger); background: rgba(200,88,115,0.14); }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .tab-btn {
      border-radius: 999px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: .22s ease;
    }
    .tab-btn.active {
      color: #5a2141;
      border-color: rgba(207, 115, 159, 0.45);
      background: linear-gradient(180deg, #ffe3ef, #f7c8dd);
      box-shadow: 0 10px 24px rgba(207, 115, 159, 0.16);
    }

    .section { display: none; }
    .section.active { display: block; }

    .grid-2, .grid-3 {
      display: grid;
      gap: 18px;
    }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .panel {
      padding: 24px;
      margin-bottom: 18px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel-title h2, .panel-title h3 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .panel-subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin: -4px 0 0;
    }

    .repo-card, .mini-card {
      padding: 20px;
      border-radius: 22px;
      background: var(--panel-strong);
      border: 1px solid rgba(205, 112, 155, 0.15);
    }

    .repo-name {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }

    .repo-desc, .small-copy {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .mini-pill {
      display: inline-flex;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-top: 14px;
      width: fit-content;
      color: var(--accent-strong);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid rgba(205, 112, 155, 0.12);
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .1em;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
    }

    tbody tr:hover td { background: rgba(248, 215, 231, 0.28); }

    .flow-wrap {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding-top: 8px;
    }

    .flow-node {
      padding: 10px 14px;
      border-radius: 14px;
      background: var(--panel-strong);
      border: 1px solid rgba(205, 112, 155, 0.16);
      font: 700 13px/1.2 'JetBrains Mono', monospace;
      color: #73405b;
    }

    .flow-arrow {
      color: var(--accent-strong);
      font-weight: 800;
    }

    .phase-list { display: grid; gap: 14px; }

    .phase-item {
      display: grid;
      grid-template-columns: 1.6fr auto 210px;
      gap: 14px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(205, 112, 155, 0.12);
    }
    .phase-item:last-child { border-bottom: 0; }

    .phase-meta strong {
      display: block;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .phase-meta span {
      font-size: 13px;
      color: var(--muted);
    }

    .phase-percent {
      font: 700 14px/1 'JetBrains Mono', monospace;
      color: var(--accent-strong);
    }

    .progress-bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(205, 112, 155, 0.12);
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #efb1cb, #cf739f);
    }

    .timeline {
      display: grid;
      gap: 14px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 50px 1fr;
      gap: 14px;
      align-items: start;
    }

    .timeline-step {
      width: 50px;
      height: 50px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: var(--panel-strong);
      border: 1px solid rgba(205, 112, 155, 0.2);
      color: var(--accent-strong);
    }

    .timeline-content {
      padding: 16px 18px;
      border-radius: 20px;
      background: var(--panel-strong);
      border: 1px solid rgba(205, 112, 155, 0.14);
    }

    .timeline-content strong {
      display: block;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .timeline-content span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .footer {
      margin-top: 26px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 20px 12px 0;
    }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: 1fr; }
      .phase-item { grid-template-columns: 1fr; }
      .hero-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .grid-2 { grid-template-columns: 1fr; }
      .container { padding: 20px 14px 56px; }
      .hero-main, .hero-side, .panel { padding: 20px; }
      h1 { font-size: 48px; }
      .subtitle { font-size: 16px; }
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <div class="backdrop"></div>
  <div class="container">
    <div class="topbar">
      <div class="pill" id="metaDate">Structural review · 6 Apr 2026</div>
      <div class="lang-switcher" aria-label="Language selector">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="es">ES</button>
        <button class="lang-btn" data-lang="de">DE</button>
      </div>
    </div>

    <section class="hero">
      <div class="card hero-main">

      <div class="card hero-side">

    <nav class="tabs" aria-label="Sections">

    <section class="section active" id="architecture">
      <div class="panel card">

          <div>

      <div class="grid-2">

        <div class="panel card">
          <div class="panel-title"><h3 id="botStructureTitle"></h3></div>

            </thead>
            <tbody id="botStructureTable"></tbody>
          </table>

      </div>
    </section>

    <section class="section" id="roles">
      <div class="panel card">
        <div class="panel-title"><h2 id="responsibilityTitle"></h2></div>
        <table>
          <thead>
            <tr><th id="thService"></th><th id="thDoes"></th><th id="thNotDoes"></th></tr>
          </thead>
          <tbody id="responsibilityTable"></tbody>
        </table>
      </div>

      <div class="grid-2">
        <div class="panel card">
          <div class="panel-title"><h3 id="permissionsTitle"></h3></div>
          <table>
            <thead>
              <tr><th id="thAction"></th><th id="thOwner"></th></tr>
            </thead>
            <tbody id="permissionsTable"></tbody>
          </table>
        </div>

        <div class="panel card">
          <div class="panel-title"><h3 id="dbAccessTitle"></h3></div>
          <div class="grid-3" id="dbAccessGrid"></div>
        </div>
      </div>
    </section>

    <section class="section" id="flow">
      <div class="panel card">
        <div class="panel-title"><h2 id="mainFlowTitle"></h2></div>
        <div class="flow-wrap" id="mainFlow1"></div>
        <div class="flow-wrap" id="mainFlow2"></div>
        <div class="flow-wrap" id="mainFlow3"></div>
      </div>

      <div class="grid-2">

          <div class="panel-title"><h3 id="outboundTitle"></h3></div>

        <div class="panel card">
          <div class="panel-title"><h3 id="inboundTitle"></h3></div>
          <div class="small-copy" id="inboundList"></div>
        </div>
      </div>

      <div class="panel card">
        <div class="panel-title"><h3 id="workflowTitle"></h3></div>
        <table>
          <thead>
            <tr><th id="thWorkflow"></th><th id="thTrigger"></th><th id="thPurpose"></th></tr>
          </thead>
          <tbody id="workflowTable"></tbody>
        </table>
      </div>
    </section>

    <section class="section" id="progress">
      <div class="panel card">
        <div class="panel-title"><h2 id="phaseProgressTitle"></h2></div>
        <div class="phase-list" id="phaseList"></div>
      </div>

      <div class="panel card">
        <div class="panel-title"><h3 id="issuesTitle"></h3></div>
        <table>
          <thead>
            <tr><th id="thPriority"></th><th id="thIssue"></th><th id="thLocation"></th></tr>
          </thead>
          <tbody id="issuesTable"></tbody>
        </table>
      </div>
    </section>

    <section class="section" id="plan">
      <div class="panel card">
        <div class="panel-title">
          <div>
            <h2 id="planTitle"></h2>
            <p class="panel-subtitle" id="planSubtitle"></p>
          </div>
        </div>
        <div class="timeline" id="timeline"></div>
      </div>
    </section>

    <div class="footer" id="footerText"></div>
  </div>

          ['7', 'QR Partner: stille Telegram-Auth', 'Email/Passwort-Login durch initData → Gateway → automatische Session ersetzen.'],
          ['8', 'TELEGRAM_BOT_URL → BOT_SERVICE_URL korrigieren', 'Gateway-Referenzen in notify.js, emergency.js und miniapp-api.js aktualisieren.'],
          ['9', 'Webhook absichern, falls TELEGRAM_SECRET_TOKEN fehlt', 'Requests ablehnen, wenn kein Secret-Token konfiguriert ist.'],
          ['10', 'Vollständigen E2E-Test ausführen', 'Phasen 0 → 1 → 1b → 3 → 4 → 5 → 6 mit zwei echten Telegram-Konten testen.']
        ]
      }
    };

    let currentLang = 'en';

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function renderRows(targetId, rows) {
      const target = document.getElementById(targetId);
      target.innerHTML = rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('');
    }

    function renderRepoGrid(data) {
      const grid = document.getElementById('repoGrid');
      grid.innerHTML = data.repos.map((repo, index) => `
        <article class="repo-card">
          <div class="repo-name">${repo[0]}</div>
          <div class="repo-desc">${repo[1]}</div>
          <div class="mini-pill">${data.repoTags[index]}</div>
        </article>
      `).join('');
    }

    function renderDbAccess(data) {
      const grid = document.getElementById('dbAccessGrid');
      grid.innerHTML = data.dbAccess.map(group => `
        <div class="mini-card">
          <div class="side-title">${group[0]}</div>
          <div class="small-copy">${group[1]}</div>
        </div>
      `).join('');
    }

    function renderFlow(targetId, steps) {
      const wrap = document.getElementById(targetId);
      wrap.innerHTML = steps.map((step, index) => `
        ${index > 0 ? '<span class="flow-arrow">→</span>' : ''}
        <span class="flow-node">${step}</span>
      `).join('');
    }

    function renderListWithBreaks(targetId, items) {
      document.getElementById(targetId).innerHTML = items.join('<br>');
    }

    function renderPhases(data) {
      const list = document.getElementById('phaseList');
      list.innerHTML = data.phases.map(phase => `
        <div class="phase-item">
          <div class="phase-meta">
            <strong>${phase[0]}</strong>
            <span>${phase[2]}</span>
          </div>
          <div class="phase-percent">${phase[1]}%</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${phase[1]}%"></div></div>
        </div>
      `).join('');
    }

    function renderTimeline(data) {
      const timeline = document.getElementById('timeline');
      timeline.innerHTML = data.plan.map(item => `
        <div class="timeline-item">
          <div class="timeline-step">${item[0]}</div>
          <div class="timeline-content">
            <strong>${item[1]}</strong>
            <span>${item[2]}</span>
          </div>
        </div>
      `).join('');
    }

    function renderLanguage(lang) {
      currentLang = lang;
      const data = content[lang];
      document.documentElement.lang = lang;

      setText('metaDate', data.metaDate);
      setText('heroBadge', data.heroBadge);
      setText('heroSubtitle', data.heroSubtitle);
      setText('stat1', data.stats[0]);
      setText('stat2', data.stats[1]);
      setText('stat3', data.stats[2]);
      setText('snapshotTitle', data.snapshotTitle);
      setText('snapshot1Label', data.snapshot[0][0]);
      setText('snapshot1Value', data.snapshot[0][1]);
      setText('snapshot2Label', data.snapshot[1][0]);
      setText('snapshot2Value', data.snapshot[1][1]);
      setText('snapshot3Label', data.snapshot[2][0]);
      setText('snapshot3Value', data.snapshot[2][1]);
      setText('snapshot4Label', data.snapshot[3][0]);
      setText('snapshot4Value', data.snapshot[3][1]);
      setText('focusTitle', data.focusTitle);
      setText('focusCopy', data.focusCopy);

      setText('tabArchitecture', data.tabs[0]);
      setText('tabRoles', data.tabs[1]);
      setText('tabFlow', data.tabs[2]);
      setText('tabProgress', data.tabs[3]);
      setText('tabPlan', data.tabs[4]);

      setText('reposTitle', data.reposTitle);
      setText('reposSubtitle', data.reposSubtitle);
      setText('infraTitle', data.infraTitle);
      setText('botStructureTitle', data.botStructureTitle);
      setText('responsibilityTitle', data.responsibilityTitle);
      setText('permissionsTitle', data.permissionsTitle);
      setText('dbAccessTitle', data.dbAccessTitle);
      setText('mainFlowTitle', data.mainFlowTitle);
      setText('outboundTitle', data.outboundTitle);
      setText('inboundTitle', data.inboundTitle);
      setText('workflowTitle', data.workflowTitle);
      setText('phaseProgressTitle', data.phaseProgressTitle);
      setText('issuesTitle', data.issuesTitle);
      setText('planTitle', data.planTitle);
      setText('planSubtitle', data.planSubtitle);
      setText('footerText', data.footerText);

      setText('thComponent', data.table.component);
      setText('thTechnology', data.table.technology);
      setText('thHosting', data.table.hosting);
      setText('thModule', data.table.module);
      setText('thFiles', data.table.files);
      setText('thFunction', data.table.function);
      setText('thService', data.table.service);
      setText('thDoes', data.table.does);
      setText('thNotDoes', data.table.notDoes);
      setText('thAction', data.table.action);
      setText('thOwner', data.table.owner);
      setText('thWorkflow', data.table.workflow);
      setText('thTrigger', data.table.trigger);
      setText('thPurpose', data.table.purpose);
      setText('thPriority', data.table.priority);
      setText('thIssue', data.table.issue);
      setText('thLocation', data.table.location);

      renderRepoGrid(data);
      renderRows('infraTable', data.infrastructure);
      renderRows('botStructureTable', data.botStructure);
      renderRows('responsibilityTable', data.responsibilities);
      renderRows('permissionsTable', data.permissions);
      renderDbAccess(data);
      renderFlow('mainFlow1', data.flows[0]);
      renderFlow('mainFlow2', data.flows[1]);
      renderFlow('mainFlow3', data.flows[2]);
      renderListWithBreaks('outboundList', data.outbound);
      renderListWithBreaks('inboundList', data.inbound);
      renderRows('workflowTable', data.workflows);
      renderPhases(data);
      renderRows('issuesTable', data.issues);
      renderTimeline(data);

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => renderLanguage(btn.dataset.lang));
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    renderLanguage('en');
  </script>
</body>
</html>
